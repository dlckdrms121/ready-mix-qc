<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Session {{ session_id }}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Realtime Session</h1>
    <p><b>session_id</b>: <code>{{ session_id }}</code></p>

    <section class="card">
      <h2>Status</h2>
      <p>Status: <span id="rtStatus">pending</span></p>
      <p>Progress: <span id="rtProgress">0</span>%</p>
      <p>Message: <span id="rtMessage">Queued</span></p>
    </section>

    <section class="card">
      <h2>Source Video</h2>
      <video id="rtSourceVideo" controls muted style="width:100%;max-width:960px;border:1px solid var(--line);border-radius:8px;background:#000;"></video>
    </section>

    <section class="card">
      <h2>Live ROI Detection + Analysis</h2>
      <img id="rtLiveFrame" class="plot" alt="live overlay frame" />
      <table id="rtStatsTable"></table>
      <p><a id="rtOverlayLink" href="#" target="_blank">Download Realtime Overlay Video</a></p>
      <p><a id="rtTraceLink" href="#" target="_blank">Download Realtime Trace CSV</a></p>
    </section>
  </main>

  <script>
    window.__RT_SESSION_ID__ = "{{ session_id }}";
  </script>
  <script src="/static/realtime_session.js"></script>
</body>
</html>
