<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SlumpGuard Quality Analyzer (Pages)</title>
  <link rel="stylesheet" href="./static/styles.css?v=20260305-7" />
</head>
<body>
  <main class="container">
    <h1>SlumpGuard Quality Analyzer</h1>
    <p class="muted">GitHub Pages Frontend + FastAPI Backend</p>

    <section class="card">
      <h2>Realtime Core Features</h2>
      <ul>
        <li>Frame-by-frame ROI detection overlay</li>
        <li>Live speed and pouring-time tracking</li>
        <li>Realtime overlay video and trace CSV export</li>
      </ul>
      <p><a href="./realtime.html"><b>Open Realtime Analyzer</b></a></p>
    </section>

    <section class="card">
      <h2>Backend API</h2>
      <div class="row2">
        <div>
          <label>API Base URL</label>
          <input type="text" id="apiBaseInput" placeholder="https://your-backend.onrender.com" />
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="saveApiBaseBtn" type="button">Save API Base</button>
        </div>
      </div>
      <div class="row2">
        <div>
          <label>&nbsp;</label>
          <button id="resetApiBaseBtn" type="button">Reset API Base</button>
        </div>
      </div>
      <p id="apiBaseText" class="muted"></p>
      <p id="healthText" class="muted"></p>
      <p id="buildText" class="muted small"></p>
    </section>

    <section class="card">
      <form id="uploadForm">
        <label>Video (.mp4)</label>
        <input type="file" id="videoFile" name="file" accept="video/mp4" required />

        <div class="preview-wrap">
          <canvas id="firstFrameCanvas" width="640" height="360"></canvas>
          <p class="muted small">First-frame preview</p>
        </div>

        <div class="row2">
          <div>
            <label>Scale mm/pixel</label>
            <input type="number" name="mm_per_pixel" step="0.0001" min="0" />
          </div>
          <div>
            <label>Chute width mm</label>
            <input type="number" name="chute_width_mm" step="0.1" min="0" />
          </div>
        </div>

        <button id="submitBtn" type="submit">Start Batch Analysis</button>
      </form>
    </section>

    <p id="statusText" class="muted"></p>
  </main>

  <script src="./config.js?v=20260305-7"></script>
  <script src="./static/common.js?v=20260305-7"></script>
  <script src="./static/pages_index.js?v=20260305-7"></script>
</body>
</html>
